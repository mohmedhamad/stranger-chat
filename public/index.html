<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f5f0e8;--bg2:#ede8de;--bg3:#fff;
  --border:#ddd6c8;--accent:#2d6a4f;--accent2:#1b4332;
  --text:#2c2c2c;--muted:#8a7f70;--green:#52b788;
  --bme:#2d6a4f;--bme-t:#fff;--bthem:#fff;
  --shadow:0 1px 4px rgba(0,0,0,.07);
  --danger:#e63946;--overlay:rgba(245,240,232,.95);
  --bar:#ede8de;--font:'DM Sans',sans-serif;
}
[data-dark]{
  --bg:#0f1117;--bg2:#161b22;--bg3:#1c2128;
  --border:#30363d;--accent:#58a6ff;--accent2:#388bfd;
  --text:#e6edf3;--muted:#8b949e;--green:#3fb950;
  --bme:#1f6feb;--bme-t:#fff;--bthem:#1c2128;
  --shadow:0 1px 6px rgba(0,0,0,.4);
  --danger:#f85149;--overlay:rgba(15,17,23,.96);
  --bar:#161b22;
}

html,body{height:100%;height:100dvh;overflow:hidden;}
body{
  font-family:var(--font);
  background:var(--bg2);
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  transition:background .3s,color .3s;
}

/* ── APP SHELL ── */
#app{
  width:100%;height:100%;
  background:var(--bg);
  display:flex;flex-direction:column;
  overflow:hidden;position:relative;
  transition:background .3s;
}

/* Desktop: card */
@media(min-width:640px){
  body{background:#1a1f2e;}
  #app{
    width:min(900px,98vw);
    height:min(860px,98dvh);
    border-radius:20px;
    border:1px solid var(--border);
    box-shadow:0 20px 60px rgba(0,0,0,.4);
  }
}

/* ── TOP BAR ── */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  background:var(--bar);
  border-bottom:1px solid var(--border);
  flex-shrink:0;gap:8px;
  transition:background .3s,border-color .3s;
}
.logo{cursor:pointer;line-height:1.1;user-select:none;}
.logo .l1{font-family:'Lora',serif;font-size:16px;font-weight:500;color:var(--accent);}
.logo .l2{font-family:'Cairo',sans-serif;font-size:10px;color:var(--muted);}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.pill{
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:var(--muted);
  background:var(--bg3);padding:4px 9px;
  border-radius:20px;border:1px solid var(--border);
  white-space:nowrap;
  transition:background .3s,border-color .3s;
}
.gdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pd 2s infinite;}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.4}}
.ibtn{
  background:none;border:1px solid var(--border);
  color:var(--muted);width:32px;height:32px;
  border-radius:50%;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.ibtn:hover{border-color:var(--accent);color:var(--accent);}

/* ── SETTINGS PANEL ── */
#spanel{
  display:none;position:absolute;
  top:52px;right:10px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:14px;padding:16px;z-index:400;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
  min-width:220px;max-width:280px;
  animation:pop .15s ease;
  transition:background .3s;
}
#spanel.open{display:block;}
.stitle{font-size:12px;font-weight:600;color:var(--text);margin-bottom:12px;letter-spacing:.5px;}
.srow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;}
.slabel{font-size:12px;color:var(--muted);flex-shrink:0;}
.lang-btns{display:flex;gap:6px;}
.lbtn{
  background:var(--bg2);border:2px solid var(--border);
  border-radius:8px;padding:3px 8px;
  font-size:11px;font-weight:600;cursor:pointer;
  color:var(--muted);transition:all .15s;
  font-family:var(--font);
}
.lbtn.active{border-color:var(--accent);color:var(--accent);}
.sdiv{height:1px;background:var(--border);margin:8px 0;}
.slabel-full{font-size:12px;color:var(--muted);margin-bottom:6px;}
/* country grid */
.cflag-grid{
  display:grid;grid-template-columns:repeat(6,1fr);
  gap:4px;max-height:140px;overflow-y:auto;
  scrollbar-width:thin;
}
.cflag-btn{
  background:none;border:2px solid transparent;
  border-radius:6px;padding:3px;font-size:20px;
  cursor:pointer;text-align:center;line-height:1;
  transition:border-color .1s,transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.cflag-btn:hover{transform:scale(1.15);}
.cflag-btn.selected{border-color:var(--accent);}
.cflag-none{
  font-size:11px;color:var(--muted);
  background:var(--bg2);border:1px solid var(--border);
  border-radius:6px;padding:4px 8px;cursor:pointer;
  width:100%;text-align:center;margin-top:4px;
  transition:all .15s;
}
.cflag-none:hover{border-color:var(--muted);}

/* night toggle */
.ntoggle{
  position:relative;width:38px;height:20px;
  display:inline-block;cursor:pointer;flex-shrink:0;
}
.ntoggle input{opacity:0;width:0;height:0;}
.nslider{
  position:absolute;inset:0;background:var(--border);
  border-radius:20px;transition:background .25s;
}
.nslider::before{
  content:'';position:absolute;
  width:14px;height:14px;border-radius:50%;
  background:#fff;left:3px;top:3px;
  transition:transform .25s;
}
.ntoggle input:checked + .nslider{background:var(--accent);}
.ntoggle input:checked + .nslider::before{transform:translateX(18px);}

/* ── SCREEN CONTAINER ── */
#screen{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* ── LANDING ── */
#s-land{

  align-items:center;justify-content:center;
  gap:14px;padding:24px 20px;
  overflow-y:auto;text-align:center;
}
.land-icon{
  width:68px;height:68px;border-radius:50%;

  display:flex;align-items:center;justify-content:center;

  flex-shrink:0;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.land-h1{font-family:'Lora',serif;font-size:26px;color:var(--text);line-height:1.2;}
.land-h1 .hl{color:var(--accent);font-style:italic;display:inline-block;animation:si .6s ease both;}
@keyframes si{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.land-sub{font-family:'Cairo',sans-serif;font-size:14px;color:var(--muted);}
.land-p{font-size:13px;color:var(--muted);line-height:1.65;max-width:290px;}
.feats{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.feat{font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--bg3);padding:3px 10px;border-radius:20px;}

/* Country picker on landing — flag grid only */
.land-country{width:100%;max-width:320px;}
.land-country-label{font-size:12px;color:var(--muted);margin-bottom:6px;text-align:center;}
.land-flag-grid{
  display:grid;grid-template-columns:repeat(6,1fr);
  gap:5px;justify-items:center;
}
.lflag-btn{
  background:none;border:2px solid transparent;
  border-radius:8px;padding:4px;font-size:22px;
  cursor:pointer;line-height:1;
  transition:border-color .1s,transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.lflag-btn:hover{transform:scale(1.12);}
.lflag-btn.sel{border-color:var(--accent);background:var(--bg2);}
.lflag-none{
  font-size:11px;color:var(--muted);
  background:none;border:1px solid var(--border);
  border-radius:8px;padding:4px 0;cursor:pointer;
  width:100%;grid-column:span 2;transition:all .15s;
}
.lflag-none:hover{border-color:var(--muted);}

.btn-big{
  background:var(--accent);color:#fff;border:none;
  padding:13px 0;font-size:14px;
  font-family:var(--font);font-weight:500;
  border-radius:50px;cursor:pointer;
  box-shadow:0 2px 12px rgba(45,106,79,.3);
  width:100%;max-width:320px;
  transition:background .15s,transform .1s;
  animation:si .7s .3s ease both;
  flex-shrink:0;
}
.btn-big:hover{background:var(--accent2);}
.btn-big:active{transform:scale(.97);}

/* ── WAITING ── */
#s-wait{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
}
.spin-wrap{
  width:64px;height:64px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;animation:breathe 1.8s ease-in-out infinite;
}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#s-wait p{font-size:13px;color:var(--muted);}
.btn-ghost{
  background:none;border:1px solid var(--border);
  color:var(--muted);padding:8px 22px;
  font-size:12px;font-family:var(--font);
  border-radius:50px;cursor:pointer;transition:all .15s;
}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);}


/* ── CHAT ── */
#s-chat{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
#chat-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;
  background:var(--bar);border-bottom:1px solid var(--border);
  flex-shrink:0;transition:background .3s,border-color .3s;
}
.cwho{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);min-width:0;}
.cwho .cdot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.cwho .cflag{font-size:16px;flex-shrink:0;}
.cwho span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-end{
  background:var(--danger);color:#fff;border:none;
  padding:5px 14px;font-size:11px;font-family:var(--font);
  border-radius:50px;cursor:pointer;flex-shrink:0;
  transition:opacity .15s;
}
.btn-end:hover{opacity:.85;}

#msgs{
  flex:1;overflow-y:auto;
  padding:14px 12px;
  display:flex;flex-direction:column;gap:10px;
  background:var(--bg);min-height:0;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  -webkit-overflow-scrolling:touch;
  transition:background .3s;
}
.msg{display:flex;flex-direction:column;max-width:78%;gap:2px;position:relative;}
.msg.them{align-self:flex-start;}
.msg.me{align-self:flex-end;}
@media(min-width:640px){.msg{max-width:52%;}}

.bubble{
  padding:10px 14px;font-size:14px;
  line-height:1.5;word-break:break-word;
  position:relative;cursor:default;
  -webkit-user-select:none;user-select:none;
}
.them .bubble{
  background:var(--bthem);color:var(--text);
  border-radius:18px 18px 18px 4px;
  border:1px solid var(--border);box-shadow:var(--shadow);
  transition:background .3s,border-color .3s;
}
.me .bubble{
  background:var(--bme);color:var(--bme-t);
  border-radius:18px 18px 4px 18px;
}
.ts{font-size:10px;color:var(--muted);padding:1px 4px;}
.me .ts{text-align:right;}

.rbar{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;}
.me .rbar{justify-content:flex-end;}
.rpill{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:2px 7px;font-size:12px;
  cursor:pointer;display:flex;align-items:center;gap:3px;
  transition:transform .1s;box-shadow:var(--shadow);user-select:none;
}
.rpill:hover{transform:scale(1.1);}
.rpill .rc{font-size:10px;color:var(--muted);}

/* emoji picker */
.epicker{
  position:fixed;background:var(--bg3);
  border:1px solid var(--border);border-radius:14px;
  padding:8px;display:flex;gap:2px;
  box-shadow:0 6px 24px rgba(0,0,0,.25);
  z-index:9999;animation:pop .12s ease;touch-action:none;
  pointer-events:all;
}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.ebtn{
  background:none;border:none;cursor:pointer;font-size:22px;
  border-radius:8px;line-height:1;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  transition:background .1s,transform .1s;
}
.ebtn:hover{background:var(--bg2);transform:scale(1.2);}
.ebtn:active{transform:scale(1.3);}

.sysmsg{
  align-self:center;font-size:11px;color:var(--muted);
  padding:4px 12px;background:var(--bg2);
  border:1px solid var(--border);border-radius:20px;
  text-align:center;flex-shrink:0;
  transition:background .3s,border-color .3s;
}
.typing-ind{
  display:flex;align-items:center;gap:4px;
  padding:10px 14px;
  background:var(--bthem);border:1px solid var(--border);
  border-radius:18px 18px 18px 4px;
  width:fit-content;box-shadow:var(--shadow);
}
.typing-ind span{
  width:5px;height:5px;border-radius:50%;background:var(--muted);
  animation:db 1.3s infinite;
}
.typing-ind span:nth-child(2){animation-delay:.2s;}
.typing-ind span:nth-child(3){animation-delay:.4s;}
@keyframes db{0%,80%,100%{opacity:.3;transform:none}40%{opacity:1;transform:translateY(-3px)}}

#input-row{
  display:flex;gap:8px;padding:10px 12px;
  border-top:1px solid var(--border);
  background:var(--bar);flex-shrink:0;align-items:flex-end;
  transition:background .3s,border-color .3s;
}
#minput{
  flex:1;background:var(--bg3);
  border:1px solid var(--border);color:var(--text);
  padding:10px 14px;font-size:16px;font-family:var(--font);
  border-radius:22px;outline:none;resize:none;
  min-height:42px;max-height:110px;line-height:1.4;
  box-shadow:var(--shadow);
  transition:border-color .15s,background .3s;
}
#minput:focus{border-color:var(--accent);}
#minput::placeholder{color:var(--muted);}
.bsend{
  background:var(--accent);color:#fff;border:none;
  width:42px;height:42px;border-radius:50%;
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(45,106,79,.3);
  -webkit-tap-highlight-color:transparent;
  transition:background .15s,transform .1s;
}
.bsend:hover{background:var(--accent2);}
.bsend:active{transform:scale(.92);}

/* ── DISCONNECTED ── */
#s-disco{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;padding:28px;text-align:center;
}
.disco-icon{font-size:38px;animation:float 3s ease-in-out infinite;}
#s-disco p{font-size:14px;color:var(--muted);line-height:1.6;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

/* ── INACTIVE OVERLAY ── */
#ioverlay{
  display:none;position:absolute;inset:0;
  background:var(--overlay);z-index:300;
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;text-align:center;padding:24px;
  backdrop-filter:blur(4px);
}
#ioverlay.on{display:flex;}
.iicon{font-size:36px;}
#imsg{font-size:14px;color:var(--muted);line-height:1.7;max-width:260px;}
#imsg strong{color:var(--text);}
#icdring{
  width:80px;height:80px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
#icdring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
#icdring svg circle{fill:none;stroke:var(--border);stroke-width:5;}
#icdring svg circle.icp{stroke:var(--danger);stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
#icdnum{font-size:24px;font-weight:700;color:var(--danger);position:relative;z-index:1;}
.btn-back{
  background:var(--accent);color:#fff;border:none;
  padding:11px 32px;font-size:14px;font-family:var(--font);
  border-radius:50px;cursor:pointer;
  transition:background .15s,transform .1s;
}
.btn-back:hover{background:var(--accent2);}
.btn-back:active{transform:scale(.97);}
</style>

<body>
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="logo" onclick="goHome()">
      <div class="l1">Chatcha</div>
      <div class="l2">شاتشا</div>
    </div>
    <div class="topbar-right">
      <div class="pill">
        <div class="gdot"></div>
        <span id="ocnt">0</span>&nbsp;<span id="olbl">online</span>
      </div>
      <button class="ibtn" id="nightbtn" onclick="toggleNight()" title="Dark mode">🌙</button>
      <button class="ibtn" onclick="toggleSettings()" title="Settings">⚙️</button>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="spanel">
    <div class="stitle" id="stitle">Settings</div>
    <div class="srow">
      <span class="slabel" id="slbl-lang">Language</span>
      <div class="lang-btns">
        <button class="lbtn" id="lb-en" onclick="setLang('en')">EN</button>
        <button class="lbtn" id="lb-ar" onclick="setLang('ar')">EG</button>
      </div>
    </div>
    <div class="srow">
      <span class="slabel" id="slbl-night">Night mode</span>
      <label class="ntoggle">
        <input type="checkbox" id="nightck" onchange="toggleNightFromCheck()"/>
        <span class="nslider"></span>
      </label>
    </div>
    <div class="sdiv"></div>
    <div class="slabel-full" id="slbl-country">Your country</div>
    <div class="cflag-grid" id="cflag-grid"></div>
    <button class="cflag-none" id="cflag-none-btn" onclick="clearCountry()">✕ None</button>
  </div>

  <!-- INACTIVE OVERLAY -->
  <div id="ioverlay">
    <div class="iicon">💤</div>
    <p id="imsg"><strong>Still there?</strong><br>You'll be disconnected in:</p>
    <div id="icdring">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="34"/>
        <circle class="icp" id="icp" cx="40" cy="40" r="34" stroke-dasharray="213.6" stroke-dashoffset="0"/>
      </svg>
      <span id="icdnum">60</span>
    </div>
    <button class="btn-back" id="imback-btn" onclick="dismissInactive()">I'm back!</button>
  </div>

  <div id="screen"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────
const isMobile = 'ontouchstart' in window;
let lang = localStorage.getItem('lang') ||
  ((navigator.language||'').toLowerCase().startsWith('ar') ? 'ar' : 'en');
let nightOn = localStorage.getItem('night') === '1';
let myMeta = (() => { try{ return JSON.parse(localStorage.getItem('meta')||'{}'); }catch(e){return {};} })();
let inChat = false;
let connecting = false;
let cancelPending = false; // flag: user clicked cancel/home, ignore pending socket events

const socket = io({ reconnectionAttempts: 5 });

// ── Translations ───────────────────────────────────────────
const T = {
  en:{
    h1a:'talk to a', h1b:'stranger.',
    arsub:'شاتشا • دردشه عربيه',
    sub:'anonymous chat. no login. no history.',
    f1:'anonymous',f2:'real people',f3:'skip anytime',
    clbl:'Pick your country:',
    start:'Start chatting',
    looking:'Searching...',
    cancel:'cancel',
    chatWith:'chatting with a stranger',
    end:'End',
    discoyou:'You ended the chat.',
    discopartner:'The stranger has left.',
    findnew:'Chat again',home:'Home',
    conn:'Connected ✦',
    online:'online',
    stillthere:'Still there?',
    discwarn:"You'll be disconnected in:",

// ── Flag grid builder ──────────────────────────────────────
function buildFlagGrid(containerId, selectedCode, onSelect) {
  const grid = document.getElementById(containerId);
  if (!grid) return;
  grid.innerHTML = '';
  COUNTRIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cflag-btn' + (c.code===selectedCode?' selected':'');
    btn.textContent = c.flag;
    btn.title = lang==='ar' ? c.ar : c.en;
    btn.onclick = () => {
      grid.querySelectorAll('.cflag-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      onSelect(c.code, c.flag);
    };
    grid.appendChild(btn);
  });
}

// Landing flag grid
function buildLandingFlags(selectedCode) {
  const grid = document.getElementById('land-flag-grid');
  if (!grid) return;
  grid.innerHTML = '';
  COUNTRIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'lflag-btn' + (c.code===selectedCode?' sel':'');
    btn.textContent = c.flag;
    btn.title = lang==='ar' ? c.ar : c.en;
    btn.onclick = () => {
      grid.querySelectorAll('.lflag-btn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      myMeta = {country:c.code, flag:c.flag};
      saveMeta();
    };
    grid.appendChild(btn);
  });
}

function clearCountry() {
  myMeta = {country:'',flag:''};
  saveMeta();
  socket.emit('set_meta', myMeta);
  document.querySelectorAll('.cflag-btn.selected,.lflag-btn.sel').forEach(b=>b.classList.remove('selected','sel'));

function saveMeta(){ localStorage.setItem('meta', JSON.stringify(myMeta)); }

// ── Online count ───────────────────────────────────────────

// ── Inactivity ─────────────────────────────────────────────
const ICD_C = 213.6; // 2*pi*34
let iTimer=null, iInterval=null, iSecs=60;

function resetITimer(){
  clearTimeout(iTimer); clearInterval(iInterval);
  hideIOverlay();
  if (!inChat) return;
  iTimer = setTimeout(startICountdown, 60000);
}

function startICountdown(){
  iSecs = 60;
  showIOverlay();
  setIRing(60);
  iInterval = setInterval(()=>{
    iSecs--;
    setIRing(iSecs);
    if (iSecs <= 0){
      clearInterval(iInterval);
      socket.emit('leave');
      inChat = false;
      hideIOverlay();
      showDisco(t.discoyou);
    }
  }, 1000);
}

function setIRing(s){
  document.getElementById('icdnum').textContent = s;
  document.getElementById('icp').style.strokeDashoffset = ICD_C*(1-s/60);
}

function showIOverlay(){ document.getElementById('ioverlay').classList.add('on'); }
function hideIOverlay(){ document.getElementById('ioverlay').classList.remove('on'); }
function dismissInactive(){ clearInterval(iInterval); hideIOverlay(); resetITimer(); }

['touchstart','mousemove','keydown','click'].forEach(ev=>{
  document.addEventListener(ev,()=>{ if(inChat) resetITimer(); },{passive:true});
});
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible' && inChat) resetITimer();
});

// ── Screens ────────────────────────────────────────────────

// Connecting countdown screen


let msgCtr = 0;
let partnerMeta = {};
let typingEl = null;
let openPickId = null, hidePickTimer = null;
let typingTimer = null, iAmTyping = false;
const remoteToLocal = new Map();
const localToRemote = new Map(); // localId of them-bubble -> original msgId

function showChat(pm){
  partnerMeta = pm || {};
  msgCtr = 0;
  remoteToLocal.clear();
  localToRemote.clear();
  const fh = partnerMeta.flag ? `<span class="cflag">${partnerMeta.flag}</span>` : '';
  document.getElementById('screen').innerHTML = `
    <div id="s-chat">
      <div id="chat-bar">
        <div class="cwho">
          <div class="cdot"></div>${fh}
          <span>${t.chatWith}</span>
        </div>
        <button class="btn-end" onclick="endChat()">${t.end}</button>
      </div>
      <div id="msgs"></div>
      <div id="input-row">
        <textarea id="minput" placeholder="${t.placeholder}" rows="1"
          oninput="autoResize(this);handleTyping()"
          onkeydown="handleKey(event)"></textarea>
        <button class="bsend" onclick="sendMsg()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>`;
  sysMsg(t.conn);
  if (!isMobile) document.getElementById('minput')?.focus();
  document.addEventListener('click', closePOnOut);
  inChat = true;
  resetITimer();
}

function showDisco(msg){
  cleanUp();
  document.removeEventListener('click', closePOnOut);
  document.getElementById('screen').innerHTML = `
    <div id="s-disco">
      <div class="disco-icon">👋</div>
      <p>${msg||t.discopartner}</p>
      <div class="btn-row">
        <button class="btn-big" onclick="findMatch()" style="max-width:220px;">${t.findnew}</button>
        <button class="btn-ghost" onclick="showLanding()">${t.home}</button>
      </div>
    </div>`;
}

function endChat(){
  cancelPending = true;
  socket.emit('leave');
  cleanUp();
  showDisco(t.discoyou);
}

// ── Chat helpers ───────────────────────────────────────────
function sysMsg(txt){
  const m=document.getElementById('msgs'); if(!m) return;
  const d=document.createElement('div'); d.className='sysmsg'; d.textContent=txt;
  m.appendChild(d); m.scrollTop=m.scrollHeight;
}

function appendMsg(who, text, forcedId){
  const m=document.getElementById('msgs'); if(!m) return null;
  const id = forcedId || ('m'+(++msgCtr));
  const now = new Date();
  const ts = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const d=document.createElement('div'); d.className=`msg ${who}`; d.dataset.id=id;
  const bubble=document.createElement('div'); bubble.className='bubble';
  bubble.innerHTML=esc(text);
  if (!isMobile){
    bubble.addEventListener('mouseenter',()=>showPicker(id, bubble));
    bubble.addEventListener('mouseleave',()=>startHidePicker(id));
  } else {
    bubble.addEventListener('touchend',e=>{ e.preventDefault(); e.stopPropagation(); togglePicker(id, bubble); });
  }
  const rb=document.createElement('div'); rb.className='rbar'; rb.id='rb-'+id;
  const tsEl=document.createElement('div'); tsEl.className='ts'; tsEl.textContent=ts;
  d.appendChild(bubble); d.appendChild(rb); d.appendChild(tsEl);
  m.appendChild(d); m.scrollTop=m.scrollHeight;
  return id;
}

// ── Emoji picker ───────────────────────────────────────────
const EMOJIS=['😂','❤️','😮','😢','👏','🔥'];

function showPicker(id, triggerEl){
  clearTimeout(hidePickTimer);
  if (openPickId===id) return;
  closeAllPickers();
  const msg=document.querySelector(`[data-id="${id}"]`); if(!msg) return;
  const pk=document.createElement('div'); pk.className='epicker'; pk.id='pk-'+id;
  if (!isMobile){
    pk.addEventListener('mouseenter',()=>clearTimeout(hidePickTimer));
    pk.addEventListener('mouseleave',()=>startHidePicker(id));
  }
  EMOJIS.forEach(em=>{
    const b=document.createElement('button'); b.className='ebtn'; b.textContent=em; b.type='button';
    if (isMobile){
      b.addEventListener('touchend',e=>{ e.preventDefault(); e.stopPropagation(); sendReaction(id,em); closeAllPickers(); });
    } else {
      b.addEventListener('click',e=>{ e.stopPropagation(); sendReaction(id,em); closeAllPickers(); });
    }
    pk.appendChild(b);
  });
  document.body.appendChild(pk);
  // Position above the bubble, clamped inside viewport
  const ref = triggerEl || msg.querySelector('.bubble');
  const rect = ref.getBoundingClientRect();
  const pkW = EMOJIS.length * 42 + 16;
  const pkH = 54;
  let left = rect.left;
  let top = rect.top - pkH - 6;
  if (left + pkW > window.innerWidth - 8) left = window.innerWidth - pkW - 8;
  if (left < 8) left = 8;
  if (top < 8) top = rect.bottom + 6;
  pk.style.left = left + 'px';
  pk.style.top = top + 'px';
  openPickId=id;
}
function startHidePicker(id){ hidePickTimer=setTimeout(()=>{ if(openPickId===id) closeAllPickers(); },400); }
function closeAllPickers(){ document.querySelectorAll('.epicker').forEach(p=>p.remove()); openPickId=null; }
function togglePicker(id, el){ if(openPickId===id){closeAllPickers();return;} showPicker(id, el); }
function closePOnOut(e){ if(!e.target.closest('.epicker')&&!e.target.closest('.bubble')) closeAllPickers(); }
document.addEventListener('touchend',e=>{ if(openPickId&&!e.target.closest('.epicker')&&!e.target.closest('.bubble')) closeAllPickers(); },{passive:true});

function sendReaction(msgId,emoji){
  // If reacting to a received message, translate to original sender's msgId
  const outId = localToRemote.get(msgId) || msgId;
  socket.emit('reaction',{msgId:outId,emoji});
  applyReaction(msgId,emoji); // apply locally using local id
}
function applyReaction(msgId,emoji){
  const rb=document.getElementById('rb-'+msgId); if(!rb) return;
  const ex=rb.querySelector(`[data-emoji="${emoji}"]`);
  if (ex){
    const c=ex.querySelector('.rc');
    c.textContent=parseInt(c.textContent||1)+1;
    ex.style.animation='none'; ex.offsetHeight; ex.style.animation='pop .15s ease';
  } else {
    const pill=document.createElement('div'); pill.className='rpill'; pill.dataset.emoji=emoji;
    pill.innerHTML=`${emoji} <span class="rc">1</span>`;
    pill.addEventListener('click',()=>sendReaction(msgId,emoji));
    rb.appendChild(pill);
  }
  const m=document.getElementById('msgs'); if(m) m.scrollTop=m.scrollHeight;
}

// ── Typing ─────────────────────────────────────────────────
function showTyping(){
  const m=document.getElementById('msgs'); if(!m||document.getElementById('ty')) return;
  const d=document.createElement('div'); d.className='msg them'; d.id='ty';
  d.innerHTML='<div class="typing-ind"><span></span><span></span><span></span></div>';
  m.appendChild(d); m.scrollTop=m.scrollHeight; typingEl=d;
}
function hideTyping(){ if(typingEl){typingEl.remove();typingEl=null;} }

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

// ── Actions ────────────────────────────────────────────────
function findMatch(){
  cancelPending = false;
  socket.emit('set_meta', myMeta);
  socket.emit('find_match');
  showWaiting();
}

function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function handleTyping(){
  if(!iAmTyping){iAmTyping=true;socket.emit('typing',true);}
  clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>{iAmTyping=false;socket.emit('typing',false);},1200);
}
function sendMsg(){
  const el=document.getElementById('minput'); if(!el) return;
  const text=el.value.trim(); if(!text) return;
  el.value=''; el.style.height='auto';
  const localId='me-'+Date.now();
  appendMsg('me',text,localId);
  socket.emit('message',{text,msgId:localId});
  if(iAmTyping){iAmTyping=false;socket.emit('typing',false);clearTimeout(typingTimer);}
  resetITimer();
}

// ── Socket events ──────────────────────────────────────────
socket.on('waiting_no_match', ()=>{
  if (cancelPending) return;
  // Just stay on waiting screen, no countdown. Retry automatically every 5s.
  const wtxt = document.getElementById('wait-txt');
  if (wtxt) wtxt.textContent = t.looking;
  setTimeout(()=>{
    if (!cancelPending) socket.emit('find_match');
  }, 5000);
});

socket.on('matched', ({partnerMeta:pm})=>{
  if (cancelPending) return;
  connecting = true;
  soundMatch();
  showChat(pm);
  connecting = false;
});

socket.on('message', ({text, msgId})=>{
  // No inChat guard — messages should be accepted once matched, even during connecting countdown
  hideTyping();
  const localId = appendMsg('them', text);
  if (localId && msgId) {
    remoteToLocal.set(msgId, localId);
    localToRemote.set(localId, msgId); // reverse: so we can react with the right id
  }
  soundMsg();
  resetITimer();
});

socket.on('reaction', ({msgId, emoji})=>{
  const localId = remoteToLocal.get(msgId);
  if (localId) applyReaction(localId, emoji);
  soundReact();
});

socket.on('typing', v=>{ if(v) showTyping(); else hideTyping(); });

socket.on('partner_left', ()=>{
  if ((!inChat && !connecting) || cancelPending) return;
  connecting = false;
  inChat = false;
  hideTyping();
  showDisco(t.discopartner);
  soundDisco();
});

// ── Init ───────────────────────────────────────────────────
applyNight();
applyLang(lang);
showLanding();

// ── Audio ──────────────────────────────────────────────────
let actx=null;
function gctx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function beep(f,d,type='sine',v=0.3){
  try{const c=gctx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type=type;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}
}
function soundMatch(){beep(520,.15);setTimeout(()=>beep(780,.2),150);}
function soundMsg(){beep(440,.08,'sine',.1);}
function soundReact(){beep(600,.06,'sine',.08);setTimeout(()=>beep(800,.08),80);}
function soundDisco(){beep(300,.25,'sawtooth',.12);}
</script>
