  <!-- SETTINGS PANEL -->
  <div id="settings-panel">
    <div class="settings-title" id="lbl-settings">Settings</div>

    <div class="setting-row">
      <span class="setting-label" id="lbl-theme">Theme</span>
      <div class="theme-btns">
        <div class="theme-dot td-light active" id="td-light" onclick="setTheme('light')" title="Light"></div>
        <div class="theme-dot td-dark" id="td-dark" onclick="setTheme('dark')" title="Dark"></div>
        <div class="theme-dot td-blink" id="td-blink" onclick="setTheme('blink')" title="Blink"></div>
      </div>
    </div>

    <div class="setting-row">
      <span class="setting-label" id="lbl-lang">Language</span>
      <div class="lang-btns">
        <button class="lang-btn" id="lb-en" onclick="setLang('en')" title="English">🏴󠁧󠁢󠁥󠁮󠁧󠁿</button>
        <button class="lang-btn" id="lb-ar" onclick="setLang('ar')" title="العربية">🇪🇬</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:6px;">
      <span class="setting-label" id="lbl-country-set">Your country</span>
      <select id="settings-country" onchange="updateMyCountry()">
        <option value="">— Skip —</option>
      </select>
    </div>
  </div>

  <!-- INACTIVE OVERLAY -->
  <div id="inactive-overlay">
    <div class="ina-icon">💤</div>
    <p id="ina-msg"><strong>Still there?</strong><br>You'll be disconnected in:</p>
    <div id="cd-ring">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="34"/>
        <circle class="cdp" id="cdp" cx="40" cy="40" r="34"
          stroke-dasharray="213.6" stroke-dashoffset="0"/>
      </svg>
      <span id="cd-num">60</span>
    </div>
    <button class="btn-big" onclick="dismissInactive()" style="max-width:200px;" id="btn-imback">I'm back!</button>
  </div>

  <div id="screen"></div>
</div>

<script>
const socket = io();
const isMobile = 'ontouchstart' in window;
const CD_CIRC = 213.6; // 2*pi*34
const CONN_CIRC = 226.2; // 2*pi*36

// ── Persistent state ───────────────────────────────────────
let currentLang = localStorage.getItem('lang') ||
  (navigator.language||'').toLowerCase().startsWith('ar') ? 'ar' : 'en';
let currentTheme = localStorage.getItem('theme') || 'light';
let nightOn = localStorage.getItem('night') === '1';
let myMeta = JSON.parse(localStorage.getItem('meta')||'{}');

// ── Translations ───────────────────────────────────────────
const T = {
  en:{
    headline:'talk to a',highlight:'stranger.',
    arsub:'شاتشا • دردشه عربيه',
    sub:'anonymous real-time chat. no login. no history.',
    f1:'anonymous',f2:'real people',f3:'skip anytime',
    clabel:'Your country (optional):',cskip:'Skip',
    start:'Start chatting',
    looking:'looking for someone...',cancel:'cancel',
    connMsg:'Connecting your chat...',
    chatWith:'chatting with',stranger:'a stranger',
    end:'End',
    discoMsg:'The stranger has left.',discoYou:'You ended the chat.',
    findNew:'Chat again',
    connected:'Connected to a stranger ✦',
    online:'online',
    stillThere:'Still there?',discWarn:"You'll be disconnected in:",
    imback:"I'm back!",sayHi:'Say something...',
    settings:'Settings',theme:'Theme',language:'Language',countryset:'Your country',
    waiting5:'Waiting for a match...',
    lbl_night:'Night mode',
  },
  ar:{
    headline:'دردش مع',highlight:'غريب.',
    arsub:'Chatcha • شاتشا',
    sub:'دردشه مجهولة مجانية. بدون تسجيل. بدون تاريخ.',
    f1:'مجهول',f2:'أشخاص حقيقيون',f3:'تخطى متى تريد',
    clabel:'بلدك (اختياري):',cskip:'تخطى',
    start:'ابدأ الدردشة',
    looking:'جاري البحث...',cancel:'إلغاء',
    connMsg:'جاري الاتصال...',
    chatWith:'تتحدث مع',stranger:'غريب',
    end:'إنهاء',
    discoMsg:'غادر الغريب المحادثة.',discoYou:'أنهيت المحادثة.',
    findNew:'دردشة جديدة',
    connected:'تم الاتصال بغريب ✦',
    online:'متصل',
    stillThere:'هل أنت هناك؟',discWarn:'سيتم قطع اتصالك خلال:',
    imback:'أنا هنا!',sayHi:'قل شيئاً...',
    settings:'الإعدادات',theme:'المظهر',language:'اللغة',countryset:'بلدك',
    waiting5:'في انتظار شخص...',
    lbl_night:'الوضع الليلي',
  }
};
let t = T[currentLang];

// ── Countries ──────────────────────────────────────────────
const COUNTRIES=[
  {code:'SA',flag:'🇸🇦',en:'Saudi Arabia',ar:'السعودية'},
  {code:'EG',flag:'🇪🇬',en:'Egypt',ar:'مصر'},
  {code:'AE',flag:'🇦🇪',en:'UAE',ar:'الإمارات'},
  {code:'KW',flag:'🇰🇼',en:'Kuwait',ar:'الكويت'},
  {code:'QA',flag:'🇶🇦',en:'Qatar',ar:'قطر'},
  {code:'BH',flag:'🇧🇭',en:'Bahrain',ar:'البحرين'},
  {code:'OM',flag:'🇴🇲',en:'Oman',ar:'عُمان'},
  {code:'JO',flag:'🇯🇴',en:'Jordan',ar:'الأردن'},
  {code:'LB',flag:'🇱🇧',en:'Lebanon',ar:'لبنان'},
  {code:'SY',flag:'🇸🇾',en:'Syria',ar:'سوريا'},
  {code:'IQ',flag:'🇮🇶',en:'Iraq',ar:'العراق'},
  {code:'YE',flag:'🇾🇪',en:'Yemen',ar:'اليمن'},
  {code:'LY',flag:'🇱🇾',en:'Libya',ar:'ليبيا'},
  {code:'TN',flag:'🇹🇳',en:'Tunisia',ar:'تونس'},
  {code:'DZ',flag:'🇩🇿',en:'Algeria',ar:'الجزائر'},
  {code:'MA',flag:'🇲🇦',en:'Morocco',ar:'المغرب'},
  {code:'SD',flag:'🇸🇩',en:'Sudan',ar:'السودان'},
  {code:'PS',flag:'🇵🇸',en:'Palestine',ar:'فلسطين'},
  {code:'OTHER',flag:'🌍',en:'Other',ar:'أخرى'},
];
function countryName(code){
  const c=COUNTRIES.find(x=>x.code===code);
  return c?(currentLang==='ar'?c.ar:c.en):'';
}
function buildOptions(selectEl, selectedCode){
  selectEl.innerHTML=`<option value="">— ${t.cskip} —</option>`;
  COUNTRIES.forEach(c=>{
    const o=document.createElement('option');
    o.value=c.code;
    o.textContent=`${c.flag} ${currentLang==='ar'?c.ar:c.en}`;
    if(c.code===selectedCode) o.selected=true;
    selectEl.appendChild(o);
  });
}

// ── Apply lang/theme on load ───────────────────────────────
function applyLang(lang){
  currentLang=lang;
  t=T[lang];
  localStorage.setItem('lang',lang);
  const root=document.getElementById('html-root');
  root.setAttribute('lang',lang);
  root.setAttribute('dir',lang==='ar'?'rtl':'ltr');
  // update labels
  const ids={
    'lbl-online':'online','lbl-settings':'settings',
    'lbl-theme':'theme','lbl-lang':'language',
    'lbl-country-set':'countryset','btn-imback':'imback',
  };
  Object.entries(ids).forEach(([id,key])=>{
    const el=document.getElementById(id);
    if(el) el.textContent=t[key];
  });
  document.getElementById('lb-en').classList.toggle('active',lang==='en');
  document.getElementById('lb-ar').classList.toggle('active',lang==='ar');
  // rebuild country dropdowns
  const sc=document.getElementById('settings-country');
  if(sc) buildOptions(sc,myMeta.country||'');
}

function applyTheme(theme){
  currentTheme=theme;
  localStorage.setItem('theme',theme);
  // night mode stacks on top
  const eff = nightOn && theme!=='blink' ? 'dark' : theme;
  document.body.setAttribute('data-theme', eff==='light'&&!nightOn?'':eff);
  ['light','dark','blink'].forEach(th=>{
    document.getElementById('td-'+th)?.classList.toggle('active',th===theme);
  });
}

function toggleNight(){
  nightOn=!nightOn;
  localStorage.setItem('night',nightOn?'1':'0');
  document.getElementById('night-btn').textContent=nightOn?'☀️':'🌙';
  applyTheme(currentTheme);
}

function setTheme(th){ applyTheme(th); }
function setLang(lang){ applyLang(lang); }

function toggleSettings(){
  document.getElementById('settings-panel').classList.toggle('open');
}
document.addEventListener('click',e=>{
  const sp=document.getElementById('settings-panel');
  if(sp.classList.contains('open')&&!e.target.closest('#settings-panel')&&!e.target.closest('.icon-btn[onclick*="Settings"]')&&!e.target.closest('[onclick="toggleSettings()"]')){
    sp.classList.remove('open');
  }
});

function updateMyCountry(){
  const sel=document.getElementById('settings-country');
  if(!sel) return;
  const c=COUNTRIES.find(x=>x.code===sel.value);
  myMeta=c?{country:c.code,flag:c.flag}:{country:'',flag:''};
  localStorage.setItem('meta',JSON.stringify(myMeta));
  socket.emit('set_meta',myMeta);
}

function goHome(){
  socket.emit('leave');
  inChatSession=false;
  clearAll();
  showLanding();
}

// ── Online count ───────────────────────────────────────────
let realOnline=0;
let fakeOffset=Math.floor(Math.random()*300)+99;
function updateOnlineDisplay(){
  document.getElementById('online-count').textContent=realOnline+fakeOffset;
}
setInterval(()=>{
  const d=Math.floor(Math.random()*21)-10;
  fakeOffset=Math.max(99,Math.min(800,fakeOffset+d));
  updateOnlineDisplay();
},5000);
socket.on('user_count',n=>{ realOnline=n; updateOnlineDisplay(); });
socket.on('ping_check',()=>socket.emit('pong_check'));

// ── Inactivity ─────────────────────────────────────────────
let inactiveWarningTimer=null, countdownInterval=null, countdownSecs=60;
let inChatSession=false;

function resetInactiveTimer(){
  clearTimeout(inactiveWarningTimer);
  clearInterval(countdownInterval);
  hideInactiveOverlay();
  if(!inChatSession) return;
  inactiveWarningTimer=setTimeout(startCountdown,60*1000);
}
function startCountdown(){
  countdownSecs=60;
  showInactiveOverlay();
  updateCdRing(60);
  countdownInterval=setInterval(()=>{
    countdownSecs--;
    updateCdRing(countdownSecs);
    if(countdownSecs<=0){
      clearInterval(countdownInterval);
      socket.emit('leave');
      hideInactiveOverlay();
      inChatSession=false;
      showDisconnected(t.discoYou,false);
    }
  },1000);
}
function updateCdRing(s){
  document.getElementById('cd-num').textContent=s;
  const offset=CD_CIRC*(1-s/60);
  document.getElementById('cdp').style.strokeDashoffset=offset;
}
function showInactiveOverlay(){ document.getElementById('inactive-overlay').classList.add('visible'); }
function hideInactiveOverlay(){ document.getElementById('inactive-overlay').classList.remove('visible'); }
function dismissInactive(){ clearInterval(countdownInterval); hideInactiveOverlay(); resetInactiveTimer(); }

['touchstart','mousemove','keydown','click'].forEach(ev=>{
  document.addEventListener(ev,()=>{ if(inChatSession) resetInactiveTimer(); },{passive:true});
});

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&inChatSession) resetInactiveTimer();
});

// ── Screens ────────────────────────────────────────────────
function clearAll(){
  clearTimeout(inactiveWarningTimer);
  clearInterval(countdownInterval);
  hideInactiveOverlay();
}

function showLanding(){
  inChatSession=false; clearAll();
  document.getElementById('settings-panel').classList.remove('open');
  // rebuild settings country
  const sc=document.getElementById('settings-country');
  if(sc) buildOptions(sc,myMeta.country||'');

  document.getElementById('screen').innerHTML=`
    <div id="s-landing">
      <div class="landing-icon">💬</div>
      <div class="landing-headline">
        <h1>${t.headline} <span class="highlight">${t.highlight}</span></h1>
      </div>
      <p class="ar-sub">${t.arsub}</p>
      <p>${t.sub}</p>
      <div class="features">
        <div class="feat">${t.f1}</div>
        <div class="feat">${t.f2}</div>
        <div class="feat">${t.f3}</div>
      </div>
      <div class="country-row">
        <label>${t.clabel}</label>
        <div class="country-select-wrap">
          <select id="country-select"></select>
          <button class="btn-skip" onclick="document.getElementById('country-select').value=''">${t.cskip}</button>
        </div>
      </div>
      <button class="btn-big" onclick="findMatch()">${t.start}</button>
    </div>`;
  buildOptions(document.getElementById('country-select'), myMeta.country||'');
}

function showWaiting(retryIn){
  inChatSession=false; clearAll();
  const msg = retryIn
    ? (currentLang==='ar'?`إعادة المحاولة خلال ${retryIn} ثوانٍ...`:`Retrying in ${retryIn}s...`)
    : t.looking;
  document.getElementById('screen').innerHTML=`
    <div id="s-waiting">
      <div class="spinner-wrap"><span>🔍</span></div>
      <p id="wait-msg">${msg}</p>
      <button class="btn-ghost" onclick="cancelSearch()">${t.cancel}</button>
    </div>`;
}

function showConnecting(sec){
  document.getElementById('screen').innerHTML=`
    <div id="s-connecting">
      <div class="conn-ring">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle cx="45" cy="45" r="36"/>
          <circle class="cp" id="connp" cx="45" cy="45" r="36"
            stroke-dasharray="${CONN_CIRC}" stroke-dashoffset="0"/>
        </svg>
        <span id="conn-num">${sec}</span>
      </div>
      <p>${t.connMsg}</p>
    </div>`;
  let s=sec;
  const iv=setInterval(()=>{
    s--;
    const el=document.getElementById('conn-num');
    if(el) el.textContent=s;
    const cp=document.getElementById('connp');
    if(cp) cp.style.strokeDashoffset=CONN_CIRC*(1-s/sec);
    if(s<=0) clearInterval(iv);
  },1000);
}

let partnerMeta={};
function showChat(pm){
  partnerMeta=pm||{};
  msgCounter=0;
  const flagHtml=partnerMeta.flag?`<span class="flag">${partnerMeta.flag}</span>`:'';
  const cname=partnerMeta.country?` (${countryName(partnerMeta.country)})`:'';
  document.getElementById('screen').innerHTML=`
    <div id="s-chat">
      <div id="chat-bar">
        <div class="chat-who">
          <div class="dot"></div>${flagHtml}
          ${t.chatWith} ${t.stranger}${cname}
        </div>
        <button class="btn-end" onclick="endChat()">${t.end}</button>
      </div>
      <div id="messages"></div>
      <div id="input-row">
        <textarea id="msg-input" placeholder="${t.sayHi}" rows="1"
          oninput="autoResize(this);handleTyping()"
          onkeydown="handleKey(event)"></textarea>
        <button class="btn-send" onclick="sendMsg()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>`;
  sysMsg(t.connected);
  if(!isMobile) document.getElementById('msg-input').focus();
  document.addEventListener('click',closePickerOnOutside);
  inChatSession=true;
  resetInactiveTimer();
}

function showDisconnected(msg,showRetry=true){
  inChatSession=false; clearAll();
  document.removeEventListener('click',closePickerOnOutside);
  document.getElementById('screen').innerHTML=`
    <div id="s-disco">
      <div class="disco-icon">👋</div>
      <p>${msg||t.discoMsg}</p>
      <div class="btn-row">
        <button class="btn-big" onclick="findMatch()" style="max-width:240px;">${t.findNew}</button>
        <button class="btn-ghost" onclick="showLanding()">${currentLang==='ar'?'الرئيسية':'Home'}</button>
      </div>
    </div>`;
}

function endChat(){
  socket.emit('leave');
  inChatSession=false;
  clearAll();
  showDisconnected(t.discoYou,false);
  // Try to re-queue after 5s
  setTimeout(()=>{ /* user chooses via button */ }, 5000);
}

function cancelSearch(){ socket.emit('leave'); showLanding(); }

// ── Chat helpers ───────────────────────────────────────────
let msgCounter=0;
function sysMsg(txt){
  const m=document.getElementById('messages');
  if(!m) return;
  const d=document.createElement('div');
  d.className='sys-msg';d.textContent=txt;
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}

function appendMsg(who,text,customId){
  const m=document.getElementById('messages');
  if(!m) return;
  const id=customId||('msg-'+(++msgCounter));
  const now=new Date();
  const ts=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const d=document.createElement('div');
  d.className=`msg ${who}`;d.dataset.id=id;
  const bubble=document.createElement('div');
  bubble.className='bubble';
  bubble.innerHTML=esc(text);
  if(!isMobile){
    bubble.addEventListener('mouseenter',()=>showPicker(id));
    bubble.addEventListener('mouseleave',()=>startHidePicker(id));
  } else {
    bubble.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();togglePicker(id);});
  }
  const rb=document.createElement('div');rb.className='reaction-bar';rb.id='rb-'+id;
  const tsEl=document.createElement('div');tsEl.className='ts';tsEl.textContent=ts;
  d.appendChild(bubble);d.appendChild(rb);d.appendChild(tsEl);
  m.appendChild(d);m.scrollTop=m.scrollHeight;
  return id;
}

// ── Emoji picker ───────────────────────────────────────────
const EMOJIS=['😂','❤️','😮','😢','👏','🔥'];
let openPickerId=null,hidePickerTimer=null;

function showPicker(msgId){
  clearTimeout(hidePickerTimer);
  if(openPickerId===msgId) return;
  closeAllPickers();
  const msg=document.querySelector(`[data-id="${msgId}"]`);
  if(!msg) return;
  const bubble=msg.querySelector('.bubble');
  const picker=document.createElement('div');
  picker.className='emoji-picker';picker.id='picker-'+msgId;
  if(!isMobile){
    picker.addEventListener('mouseenter',()=>clearTimeout(hidePickerTimer));
    picker.addEventListener('mouseleave',()=>startHidePicker(msgId));
  }
  EMOJIS.forEach(emoji=>{
    const btn=document.createElement('button');
    btn.className='emoji-btn';btn.textContent=emoji;btn.type='button';
    if(isMobile){
      btn.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();sendReaction(msgId,emoji);closeAllPickers();});
    } else {
      btn.addEventListener('click',e=>{e.stopPropagation();sendReaction(msgId,emoji);closeAllPickers();});
    }
    picker.appendChild(btn);
  });
  bubble.appendChild(picker);
  openPickerId=msgId;
}
function startHidePicker(id){ hidePickerTimer=setTimeout(()=>{if(openPickerId===id)closeAllPickers();},400); }
function closeAllPickers(){ document.querySelectorAll('.emoji-picker').forEach(p=>p.remove());openPickerId=null; }
function togglePicker(id){ if(openPickerId===id){closeAllPickers();return;}showPicker(id); }
function closePickerOnOutside(e){ if(!e.target.closest('.emoji-picker')&&!e.target.closest('.bubble')) closeAllPickers(); }
document.addEventListener('touchend',e=>{
  if(openPickerId&&!e.target.closest('.emoji-picker')&&!e.target.closest('.bubble')) closeAllPickers();
},{passive:true});

function sendReaction(msgId,emoji){
  socket.emit('reaction',{msgId,emoji});
  applyReaction(msgId,emoji);
}
function applyReaction(msgId,emoji){
  const rb=document.getElementById('rb-'+msgId);
  if(!rb) return;
  const ex=rb.querySelector(`[data-emoji="${emoji}"]`);
  if(ex){
    const c=ex.querySelector('.count');
    c.textContent=parseInt(c.textContent||1)+1;
    ex.style.animation='none';ex.offsetHeight;ex.style.animation='pop 0.15s ease';
  } else {
    const pill=document.createElement('div');
    pill.className='react-pill';pill.dataset.emoji=emoji;
    pill.innerHTML=`${emoji} <span class="count">1</span>`;
    pill.addEventListener('click',()=>sendReaction(msgId,emoji));
    rb.appendChild(pill);
  }
  const m=document.getElementById('messages');
  if(m) m.scrollTop=m.scrollHeight;
}

// ── Typing ─────────────────────────────────────────────────
let typingTimer=null,iAmTyping=false,typingEl=null;
function showTypingIndicator(){
  const m=document.getElementById('messages');
  if(!m||document.getElementById('typing-el')) return;
  const d=document.createElement('div');d.className='msg them';d.id='typing-el';
  d.innerHTML='<div class="typing-indicator"><span></span><span></span><span></span></div>';
  m.appendChild(d);m.scrollTop=m.scrollHeight;typingEl=d;
}
function hideTypingIndicator(){ if(typingEl){typingEl.remove();typingEl=null;} }

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// ── Actions ────────────────────────────────────────────────
function findMatch(){
  // read landing country
  const sel=document.getElementById('country-select');
  if(sel&&sel.value){
    const c=COUNTRIES.find(x=>x.code===sel.value);
    if(c){ myMeta={country:c.code,flag:c.flag}; localStorage.setItem('meta',JSON.stringify(myMeta)); }
  }
  socket.emit('set_meta',myMeta);
  socket.emit('find_match');
  showWaiting();
}

function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function handleTyping(){
  if(!iAmTyping){iAmTyping=true;socket.emit('typing',true);}
  clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>{iAmTyping=false;socket.emit('typing',false);},1200);
}
function sendMsg(){
  const el=document.getElementById('msg-input');
  if(!el) return;
  const text=el.value.trim();if(!text) return;
  el.value='';el.style.height='auto';
  const id='msg-me-'+Date.now();
  appendMsg('me',text,id);
  socket.emit('message',{text,msgId:id});
  if(iAmTyping){iAmTyping=false;socket.emit('typing',false);clearTimeout(typingTimer);}
  resetInactiveTimer();
}

// ── Socket events ──────────────────────────────────────────
// msgId map: their msgId → our local element id
const remoteToLocal=new Map();

socket.on('waiting',()=>{
  // server couldn't find match immediately, retry in 5s
  let s=5;
  showWaiting(s);
  const iv=setInterval(()=>{
    s--;
    const el=document.getElementById('wait-msg');
    if(el&&s>0) el.textContent=currentLang==='ar'?`إعادة المحاولة خلال ${s} ثوانٍ...`:`Retrying in ${s}s...`;
    if(s<=0){
      clearInterval(iv);
      socket.emit('find_match');
    }
  },1000);
});

socket.on('matched',({partnerMeta:pm})=>{
  soundMatch();
  showConnecting(4);
  setTimeout(()=>showChat(pm),4000);
});

socket.on('message',({text,msgId})=>{
  hideTypingIndicator();
  const localId=appendMsg('them',text);
  // map their msgId → our localId so reactions can find the right bubble
  remoteToLocal.set(msgId,localId);
  soundMessage();
  resetInactiveTimer();
});

socket.on('reaction',({msgId,emoji})=>{
  // msgId here is the sender's local id — we need to find our matching bubble
  const localId=remoteToLocal.get(msgId);
  if(localId) applyReaction(localId,emoji);
  soundReaction();
});

socket.on('typing',isTyping=>{
  if(isTyping) showTypingIndicator(); else hideTypingIndicator();
});

socket.on('partner_left',()=>{
  hideTypingIndicator();
  showDisconnected(t.discoMsg);
  soundDisconnect();
});

// ── Init ───────────────────────────────────────────────────
applyTheme(currentTheme);
if(nightOn){ document.getElementById('night-btn').textContent='☀️'; applyTheme(currentTheme); }
applyLang(currentLang);
// init settings country
buildOptions(document.getElementById('settings-country'),myMeta.country||'');
showLanding();

// ── Audio ──────────────────────────────────────────────────
let audioCtx=null;
function getCtx(){if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function beep(freq,dur,type='sine',vol=0.3){
  try{
    const ctx=getCtx();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;o.type=type;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function soundMatch(){beep(520,0.15);setTimeout(()=>beep(780,0.2),150);}
function soundMessage(){beep(440,0.08,'sine',0.12);}
function soundReaction(){beep(600,0.06,'sine',0.1);setTimeout(()=>beep(800,0.08),80);}
function soundDisconnect(){beep(300,0.25,'sawtooth',0.15);}
</script>
